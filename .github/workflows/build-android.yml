name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: inspectpro-mobile-new

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node ───────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: inspectpro-mobile-new/package-lock.json

      # ── 3. Java ───────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ────────────────────────────────────────────
      - name: Accept Android SDK licenses
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "platforms;android-36" "build-tools;35.0.0"

      # ── 5. Gradle cache ───────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('inspectpro-mobile-new/**/*.gradle*', 'inspectpro-mobile-new/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 6. Install deps ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 7. Prebuild ───────────────────────────────────────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      # ✅ CRITICAL FIX — PATCH AFTER PREBUILD
      - name: Apply Gradle patches
        run: node scripts/eas-gradle-patch.js

      # ── 8. local.properties ───────────────────────────────────────
      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      # ── 9. Build APK ──────────────────────────────────────────────
      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

      # ── 10. Upload ────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: inspectpro-debug-${{ github.run_number }}
          path: inspectpro-mobile-new/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
