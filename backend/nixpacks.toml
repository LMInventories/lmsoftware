# Force nixpacks to treat this as a Python project.
# Without this, any stray package.json causes nixpacks to detect Node.js instead.
# We only override the start command — nixpacks handles venv creation and pip install itself.
providers = ["python"]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 300 --access-logfile - --error-logfile -"
