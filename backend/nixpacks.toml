# Force nixpacks to treat this as a Python project.
# Without this, the stray package.json in this directory causes nixpacks
# to detect Node.js and skip Python/gunicorn entirely.
providers = ["python"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -"
