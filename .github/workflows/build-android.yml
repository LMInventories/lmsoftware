name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Debug APK
    runs-on: ubuntu-latest

    # All `run` steps execute inside the mobile app subdirectory
    defaults:
      run:
        working-directory: inspectpro-mobile-new

    steps:
      # ── 1. Source code ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Runtimes ────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: inspectpro-mobile-new/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK ─────────────────────────────────────────────────────
      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # ── 4. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('inspectpro-mobile-new/**/*.gradle*', 'inspectpro-mobile-new/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 5. JS dependencies ─────────────────────────────────────────────────
      # postinstall runs automatically and patches
      # @react-native/gradle-plugin/settings-plugin/build.gradle.kts
      - name: Install dependencies
        run: npm ci

      # ── 6. Generate native Android project ─────────────────────────────────
      # withKotlinBuildFix config plugin runs here and:
      #   • Downgrades gradle-wrapper.properties from Gradle 9.0.0 → 8.13
      #   • Writes kotlin.compiler.execution.strategy=in-process
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      # ── 7. Build ───────────────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

      # ── 8. Upload artifact ─────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: inspectpro-debug-${{ github.run_number }}
          path: inspectpro-mobile-new/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
